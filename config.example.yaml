model: null            # null -> auto (sonnet-5, opus for 12mo/all)
max_input_tokens: 60000
output_language: en    # en | he
plants:
  - name: SolarEdge Roof
    auth:
      platform: solaredge
      mode: api_key
      api_key: ${SOLAREDGE_API_KEY}
      # password-mode fallback (requires one-time browser login, see README):
      # mode: password
      # username: ${SOLAREDGE_USERNAME}
      # password: ${SOLAREDGE_PASSWORD}
    tariff_per_kwh: 0.55
    currency: ILS
  - name: Growatt Roof
    auth:
      platform: growatt
      mode: token
      token: ${GROWATT_TOKEN}
    tariff_per_kwh: 0.55
    currency: ILS
