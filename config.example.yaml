model: null            # null -> auto (sonnet-5, opus for 12mo/all)
max_input_tokens: 60000
output_language: en    # en | he
plants:
  - name: SolarEdge Roof
    auth:
      platform: solaredge
      mode: password
      username: ${SOLAREDGE_USERNAME}
      password: ${SOLAREDGE_PASSWORD}
